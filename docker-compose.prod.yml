# Mode 2: Production
# Usage:
#   2A (self-hosted infra):  docker compose -f docker-compose.prod.yml --profile infra up -d
#   2B (cloud DB):           docker compose -f docker-compose.prod.yml up -d
#   Scale backend:           docker compose -f docker-compose.prod.yml --profile infra up -d --scale backend=2

services:
  caddy:
    image: caddy:2-alpine
    # Caddy owns 80 (ACME HTTP-01 challenge + auto-redirect to https) and 443
    # (TLS). Both are fixed by protocol — no AF_HTTP_PORT knob like the old nginx
    # had. Both must be open to the public in the host firewall.
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Fail loudly at `up` if unset — Caddy can't obtain a cert without a
      # domain, and Let's Encrypt wants a contact email.
      - AF_DOMAIN=${AF_DOMAIN:?Set AF_DOMAIN in .env (e.g. twctoolbox.com)}
      - AF_ACME_EMAIL=${AF_ACME_EMAIL:?Set AF_ACME_EMAIL in .env}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Same flag-file + assets dir the nginx setup used; maintenance.sh writes
      # MAINTENANCE_ON here and Caddy stat's it per-request.
      - ./deploy/maintenance:/etc/caddy/maintenance:ro
      # caddy_data holds issued certs + the ACME account key. MUST persist —
      # losing it forces re-issuance on every recreate and can trip Let's
      # Encrypt's per-domain rate limit (50 certs/week).
      - caddy_data:/data
      - caddy_config:/config
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    # docker-logs disk cap. Default json-file driver is unbounded — long-running
    # containers can pile up GBs of logs and fill the host disk. 100m × 3 = 300MB
    # ceiling per service; same block repeated on every service below.
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: artifactflow:latest
    expose:
      - "8000"
    mem_limit: 2g
    volumes:
      - artifactflow_data:/app/data
      - ./config:/app/config:ro
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    # SYS_PTRACE: backup attach path (`docker exec backend py-spy dump --pid 1`).
    # Container-scope capability — only ptrace within this container's PID ns.
    # See deploy/docker-compose.intranet.yml for the full rationale.
    cap_add:
      - SYS_PTRACE
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=
    image: artifactflow-frontend:latest
    expose:
      - "3000"
    mem_limit: 1g
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config/site:/app/public/site:ro
    # node:20-alpine base — use node itself (no curl/wget guarantees on slim images).
    # Accepts any non-5xx as alive: Next.js may 200 the home page or 3xx-redirect to /login.
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    profiles: ["infra"]
    mem_limit: 2g
    # max_connections sized for backend pool (POOL_SIZE=20 + MAX_OVERFLOW=40 = 60)
    # plus PG internal workers, alembic, and debug headroom. shared_buffers raised
    # from 128MB default to fit the larger connection count.
    # timezone=UTC: session TZ must match Python utils.time.utc_now() so
    # server_default=func.now() / onupdate=func.now() write UTC naive. /etc/localtime
    # mount below only affects PG log timestamp rendering, not session timezone.
    # Cloud-managed PG (RDS / Aurora) + DATABASE_URLS failover nodes are NOT
    # covered here — see src/db/database.py connect_args server_settings for the
    # belt-and-suspenders defense. (Incident 2026-05-14 PR-tz-unify.)
    command: postgres -c max_connections=200 -c shared_buffers=256MB -c timezone=UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-artifactflow}
      POSTGRES_USER: ${POSTGRES_USER:-artifactflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-artifactflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    profiles: ["infra"]
    mem_limit: 768m
    volumes:
      - redis_data:/data
      - /etc/localtime:/etc/localtime:ro
    # noeviction is intentional: lease / interrupt / cancel / queue / stream keys
    # all carry TTL, so any *keys-lru / volatile-lru policy would evict whole
    # control-state keys at random — silently killing in-flight tasks (consumer
    # treats missing lease as producer-lost; cancel/interrupt signals just vanish).
    # We prefer loud write failure → operator scales up. 512mb sized for 64-way
    # concurrent execution (peak ~130MB streams + runtime), ~4× headroom over 256mb.
    # Stream entries are trimmed by XADD MAXLEN, not by eviction policy.
    command: >
      redis-server --appendonly yes --appendfsync everysec
      --maxmemory 512mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    restart: unless-stopped

volumes:
  artifactflow_data:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

# 采样参数策略:不在这一层设全局默认。每个模型如需特定 temperature/top_p/...
# 在该模型 params 里显式声明;未声明的参数交给 provider/模型默认决定(OpenAI/DeepSeek
# 默认 1.0、vLLM 用 max_model_len 兜 max_tokens 等)。详见 src/models/llm.py 注释。

# 模型配置
models:
  # OpenAI
  gpt-4o:
    model: gpt-4o
    vision: true  # 多模态(可识图)。read_artifact 仅向 vision:true 的模型注入图块。

  gpt-4o-mini:
    model: gpt-4o-mini
    vision: true

  # Qwen3.7 — 闭源(2026-05 最新旗舰;文本仅 max 档,无 3.7-plus)
  qwen3.7-max:
    model: dashscope/qwen3.7-max
    params:
      enable_thinking: true
      temperature: 0.6
      top_p: 0.95
      top_k: 20

  qwen3.7-max-no-thinking:
    model: dashscope/qwen3.7-max
    params:
      enable_thinking: false
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      presence_penalty: 1.5

  # Qwen3.7-plus — 闭源,多模态(早融合视觉,可识图/图表/截图)
  qwen3.7-plus:
    model: dashscope/qwen3.7-plus
    vision: true  # read_artifact 据此向本模型注入图块;文本模型(max)只得占位文本。
    params:
      enable_thinking: true
      temperature: 0.6
      top_p: 0.95
      top_k: 20

  qwen3.7-plus-no-thinking:
    model: dashscope/qwen3.7-plus
    vision: true
    params:
      enable_thinking: false
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      presence_penalty: 1.5

  # DeepSeek
  deepseek-chat:
    model: deepseek/deepseek-chat

  deepseek-reasoner:
    model: deepseek/deepseek-reasoner

  # ========================================
  # 私有部署示例（取消注释并修改后使用）
  # ========================================

  # # Ollama 本地部署
  # local-llama:
  #   model: ollama/llama3
  #   base_url: http://localhost:11434/v1
  #   api_key: ollama

  # # vLLM 部署
  # my-qwen:
  #   model: openai/Qwen2-7B-Instruct
  #   base_url: http://localhost:8000/v1
  #   api_key: token-abc123

  # # 任意 OpenAI 兼容接口（无 litellm provider 前缀会自动加 openai/）
  # my-custom:
  #   model: my-model
  #   base_url: http://10.0.0.1:8080/v1
  #   params:
  #     temperature: 0.5

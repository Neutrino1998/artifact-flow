# 采样参数策略:不在这一层设全局默认。每个模型如需特定 temperature/top_p/...
# 在该模型 params 里显式声明;未声明的参数交给 provider/模型默认决定(OpenAI/DeepSeek
# 默认 1.0、vLLM 用 max_model_len 兜 max_tokens 等)。详见 src/models/llm.py 注释。

# 模型配置（内网部署：vLLM @ 172.25.16.129:8005）
# 服务端启动需带 --reasoning-parser deepseek_v3 才会回填 reasoning_content 字段；
# thinking 通过 extra_body.chat_template_kwargs.thinking 切换（V3.1 系默认关）。
models:
  deepseek-v4-flash:
    model: openai/deepseek-v4-flash
    base_url: http://172.25.16.129:8005/v1
    api_key: dummy
    params:
      temperature: 0.6
      top_p: 0.95
      extra_body:
        chat_template_kwargs:
          thinking: true

  deepseek-v4-flash-no-thinking:
    model: openai/deepseek-v4-flash
    base_url: http://172.25.16.129:8005/v1
    api_key: dummy
    params:
      temperature: 0.7
      top_p: 0.95
      extra_body:
        chat_template_kwargs:
          thinking: false


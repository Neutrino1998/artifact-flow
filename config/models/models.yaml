# 默认参数（所有模型共享，模型级 params 覆盖）
defaults:
  temperature: 0.7
  max_tokens: 4096

# 模型配置
models:
  # OpenAI
  gpt-4o:
    model: gpt-4o

  gpt-4o-mini:
    model: gpt-4o-mini

  # Qwen3.5 — 闭源
  qwen3.5-plus:
    model: dashscope/qwen3.5-plus
    params:
      enable_thinking: true
      temperature: 0.6
      top_p: 0.95
      top_k: 20

  qwen3.5-plus-no-thinking:
    model: dashscope/qwen3.5-plus
    params:
      enable_thinking: false
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      presence_penalty: 1.5

  qwen3.5-flash:
    model: dashscope/qwen3.5-flash
    params:
      enable_thinking: true
      temperature: 0.6
      top_p: 0.95
      top_k: 20

  qwen3.5-flash-no-thinking:
    model: dashscope/qwen3.5-flash
    params:
      enable_thinking: false
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      presence_penalty: 1.5

  # Qwen3.5 — 开源
  qwen3.5-35b-a3b:
    model: dashscope/qwen3.5-35b-a3b
    params:
      enable_thinking: true
      temperature: 0.6
      top_p: 0.95
      top_k: 20

  qwen3.5-35b-a3b-no-thinking:
    model: dashscope/qwen3.5-35b-a3b
    params:
      enable_thinking: false
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      presence_penalty: 1.5

  # DeepSeek
  deepseek-chat:
    model: deepseek/deepseek-chat

  deepseek-reasoner:
    model: deepseek/deepseek-reasoner

  # ========================================
  # 私有部署示例（取消注释并修改后使用）
  # ========================================

  # # Ollama 本地部署
  # local-llama:
  #   model: ollama/llama3
  #   base_url: http://localhost:11434/v1
  #   api_key: ollama

  # # vLLM 部署
  # my-qwen:
  #   model: openai/Qwen2-7B-Instruct
  #   base_url: http://localhost:8000/v1
  #   api_key: token-abc123

  # # 任意 OpenAI 兼容接口（无 litellm provider 前缀会自动加 openai/）
  # my-custom:
  #   model: my-model
  #   base_url: http://10.0.0.1:8080/v1
  #   params:
  #     temperature: 0.5

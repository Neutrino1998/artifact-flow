upstream backend {
    server backend:8000;
    keepalive 16;
}

upstream frontend {
    server frontend:3000;
    keepalive 8;
}

server {
    listen 80;
    server_name _;

    # Batched upload ceiling — the AUTHORITATIVE total-bytes cap. POST /api/v1/chat
    # sends ALL attachments in ONE multipart request, so the body is the SUM of the
    # batch. Three INDEPENDENT axes: per-file ≤100MB (MAX_UPLOAD_SIZE, app 422),
    # count ≤10 (MAX_CHAT_ATTACHMENTS, app 422), and total ≤200MB (THIS cap, 413).
    # Total is deliberately LESS than per-file×count (100MB×10=1GB): the design
    # intent is "one big file OR many small ones, but a bounded total". So — unlike
    # the old contract — this DOES fire ahead of the per-file/count checks for a
    # large batch, by design (a single oversize file still gets the backend's clean
    # 422, since 100MB<210M). 210M = 200MB content + 10M multipart boundary/header.
    client_max_body_size 210M;

    # Docker internal DNS resolver (required for --scale)
    resolver 127.0.0.11 valid=10s;

    # --- Maintenance mode: flag-file gate (no reload needed) ---
    # Toggle via deploy/scripts/maintenance.sh on|off — touches/removes the
    # MAINTENANCE_ON flag in the mounted maintenance dir. The `if (-f ...)`
    # check runs per-request, so flips are immediate.
    #
    # The gate is applied INSIDE each upstream location (not at server level)
    # so the /__maintenance/ static assets stay reachable while the flag is up.
    # Otherwise the maintenance page's own <img> / fetch() would 503 too.

    # Static assets for the maintenance page (always reachable, never gated).
    location /__maintenance/ {
        alias /etc/nginx/maintenance/;
        location = /__maintenance/note.txt { add_header Cache-Control "no-store"; }
    }

    # 503 → maintenance.html. Named location only — `error_page 503 @maintenance`
    # is set INSIDE each gated location below, NOT at server scope. Reason:
    # `proxy_intercept_errors` defaults to off so upstream 503s pass through
    # today, but a server-level error_page would silently rewrite real backend
    # 503s (e.g. /health/ready dep-failure JSON) the moment anyone flips that
    # default. Pairing the directive with each `if return 503` keeps intent
    # local and prevents future config drift from breaking the contract.
    location @maintenance {
        root /etc/nginx/maintenance;
        rewrite ^.*$ /maintenance.html break;
        add_header Cache-Control "no-store";
        add_header Retry-After 60 always;
    }

    # --- Backend: SSE streaming (long-lived connections) ---
    location /api/v1/stream/ {
        if (-f /etc/nginx/maintenance/MAINTENANCE_ON) { return 503; }
        error_page 503 @maintenance;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE: disable buffering, long timeout
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        chunked_transfer_encoding off;
    }

    # --- Backend: API + health ---
    location /api/ {
        if (-f /etc/nginx/maintenance/MAINTENANCE_ON) { return 503; }
        error_page 503 @maintenance;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # /health/ is intentionally NOT gated — used by container healthchecks /
    # external monitors, must keep returning real status during maintenance.
    location /health/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # --- Block Swagger/OpenAPI docs in production ---
    location ~ ^/(docs|redoc|openapi\.json)$ {
        return 404;
    }

    # --- Frontend: catch-all ---
    location / {
        if (-f /etc/nginx/maintenance/MAINTENANCE_ON) { return 503; }
        error_page 503 @maintenance;

        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

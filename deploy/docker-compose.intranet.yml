# Mode 3: Intranet (air-gapped) — pre-built images via docker save/load
# Usage:
#   3A (self-hosted infra):  docker compose -f deploy/docker-compose.intranet.yml --profile infra up -d
#   3B (internal DB):        docker compose -f deploy/docker-compose.intranet.yml up -d

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${AF_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./maintenance:/etc/nginx/maintenance:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    image: artifactflow:${AF_VERSION:-latest}
    expose:
      - "8000"
    mem_limit: 2g
    # Old Docker (≤19.x) on old kernels (CentOS 7 / 3.10) ships a seccomp
    # profile that blocks rseq, which Debian Trixie's glibc uses inside
    # pthread_create — backend dies at startup with "can't start new thread"
    # the moment asyncio touches its threadpool. Disabling seccomp restores
    # the missing syscalls; on intranet behind a firewall this is acceptable.
    # Drop this line on Docker 20.10+ where the default profile is current.
    security_opt:
      - seccomp:unconfined
    volumes:
      - artifactflow_data:/app/data
      - ../config:/app/config:ro
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    restart: unless-stopped

  frontend:
    image: artifactflow-frontend:${AF_VERSION:-latest}
    expose:
      - "3000"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ../config/site:/app/public/site:ro
    # node:20-alpine base — use node itself (no curl/wget guarantees on slim images).
    # Accepts any non-5xx as alive: Next.js may 200 the home page or 3xx-redirect to /login.
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    profiles: ["infra"]
    # max_connections sized for backend pool (POOL_SIZE=20 + MAX_OVERFLOW=40 = 60)
    # plus PG internal workers, alembic, and debug headroom. shared_buffers raised
    # from 128MB default to fit the larger connection count.
    command: postgres -c max_connections=200 -c shared_buffers=256MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-artifactflow}
      POSTGRES_USER: ${POSTGRES_USER:-artifactflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-artifactflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    profiles: ["infra"]
    mem_limit: 768m
    volumes:
      - redis_data:/data
      - /etc/localtime:/etc/localtime:ro
    # noeviction is intentional: lease / interrupt / cancel / queue / stream keys
    # all carry TTL, so any *keys-lru / volatile-lru policy would evict whole
    # control-state keys at random — silently killing in-flight tasks (consumer
    # treats missing lease as producer-lost; cancel/interrupt signals just vanish).
    # We prefer loud write failure → operator scales up. 512mb sized for 64-way
    # concurrent execution (peak ~130MB streams + runtime), ~4× headroom over 256mb.
    # Stream entries are trimmed by XADD MAXLEN, not by eviction policy.
    command: >
      redis-server --appendonly yes --appendfsync everysec
      --maxmemory 512mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  artifactflow_data:
  postgres_data:
  redis_data:

# Mode 3: Intranet (air-gapped) — pre-built images via docker save/load
# Usage:
#   3A (self-hosted infra):  docker compose -f deploy/docker-compose.intranet.yml --profile infra up -d
#   3B (internal DB):        docker compose -f deploy/docker-compose.intranet.yml up -d
#
# Project name pinned to `artifactflow` (else compose v2 defaults to the
# compose file's directory basename `deploy` → containers become
# `deploy-backend-1` etc., low recognizability under `docker ps`). Volume
# names below are also pinned with explicit `name:` so resource identity
# is independent of the project name — future project renames won't
# orphan data. Pre-pin deployments (volumes named `deploy_*` by compose's
# default project prefix) MUST follow `deploy/MIGRATION-project-name.md`
# before the first `up -d` on this version — without migration, fresh
# `artifactflow_*` volumes get mounted and PG runs initdb on an empty
# data dir.
name: artifactflow

services:
  nginx:
    image: nginx:1.30.1-alpine
    ports:
      - "${AF_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./maintenance:/etc/nginx/maintenance:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    # docker-logs disk cap. Default json-file driver is unbounded — long-running
    # containers can pile up GBs of logs and fill the host disk. 100m × 3 = 300MB
    # ceiling per service; same block repeated on every service below.
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    restart: unless-stopped

  backend:
    image: artifactflow:${AF_VERSION:-latest}
    expose:
      - "8000"
    mem_limit: 2g
    volumes:
      - artifactflow_data:/app/data
      - ../config:/app/config:ro
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    # SYS_PTRACE: lets `docker exec backend py-spy dump --pid 1` work as the
    # backup attach path (primary is faulthandler deadman → docker logs).
    # Container-scope capability — only allows ptrace within this container's
    # PID namespace; does not affect host or other containers. py-spy is
    # baked into the image (Dockerfile builder stage), so no bind-mount needed.
    cap_add:
      - SYS_PTRACE
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    restart: unless-stopped

  frontend:
    image: artifactflow-frontend:${AF_VERSION:-latest}
    expose:
      - "3000"
    mem_limit: 1g
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ../config/site:/app/public/site:ro
    # node:20-alpine base — use node itself (no curl/wget guarantees on slim images).
    # Accepts any non-5xx as alive: Next.js may 200 the home page or 3xx-redirect to /login.
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    profiles: ["infra"]
    mem_limit: 2g
    # max_connections sized for backend pool (POOL_SIZE=20 + MAX_OVERFLOW=40 = 60)
    # plus PG internal workers, alembic, and debug headroom. shared_buffers raised
    # from 128MB default to fit the larger connection count.
    # timezone=UTC: session TZ must match Python utils.time.utc_now() so
    # server_default=func.now() / onupdate=func.now() write UTC naive (incident
    # 2026-05-14 PR-tz-unify). /etc/localtime mount below only affects PG log
    # timestamp rendering, not session timezone — keep for docker-logs readability.
    command: postgres -c max_connections=200 -c shared_buffers=256MB -c timezone=UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-artifactflow}
      POSTGRES_USER: ${POSTGRES_USER:-artifactflow}
      # NOT `:?` — Compose interpolates this at PARSE time regardless of which
      # profile runs, so a `:?` guard would make Mode 3B (internal DB, no infra
      # profile, POSTGRES_* removed from .env) fail `up`/`config` before it even
      # starts. The image itself is the loud guard: postgres:16-alpine refuses to
      # init with an empty password, so a 3A user who forgets it still fails hard,
      # just at container start. (Mirrors docker-compose.prod.yml — same bug,
      # sibling file.)
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-artifactflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    profiles: ["infra"]
    mem_limit: 768m
    volumes:
      - redis_data:/data
      - /etc/localtime:/etc/localtime:ro
    # noeviction is intentional: lease / interrupt / cancel / queue / stream keys
    # all carry TTL, so any *keys-lru / volatile-lru policy would evict whole
    # control-state keys at random — silently killing in-flight tasks (consumer
    # treats missing lease as producer-lost; cancel/interrupt signals just vanish).
    # We prefer loud write failure → operator scales up. 512mb sized for 64-way
    # concurrent execution (peak ~130MB streams + runtime), ~4× headroom over 256mb.
    # Stream entries are trimmed by XADD MAXLEN, not by eviction policy.
    command: >
      redis-server --appendonly yes --appendfsync everysec
      --maxmemory 512mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    restart: unless-stopped

volumes:
  # Explicit `name:` pins the resource name (no project prefix). Pre-pin
  # deployments must migrate `deploy_*` → these names first; see
  # `deploy/MIGRATION-project-name.md`.
  artifactflow_data:
    name: artifactflow_data
  postgres_data:
    name: artifactflow_postgres_data
  redis_data:
    name: artifactflow_redis_data

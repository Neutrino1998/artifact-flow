# Mode 3: Intranet (air-gapped) — pre-built images via docker save/load
# Usage:
#   3A (self-hosted infra):  docker compose -f deploy/docker-compose.intranet.yml --profile infra up -d
#   3B (internal DB):        docker compose -f deploy/docker-compose.intranet.yml up -d

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${AF_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

  backend:
    image: artifactflow:${AF_VERSION:-latest}
    expose:
      - "8000"
    volumes:
      - artifactflow_data:/app/data
      - ../config:/app/config:ro
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    restart: unless-stopped

  frontend:
    image: artifactflow-frontend:${AF_VERSION:-latest}
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    profiles: ["infra"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-artifactflow}
      POSTGRES_USER: ${POSTGRES_USER:-artifactflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-artifactflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    profiles: ["infra"]
    volumes:
      - redis_data:/data
    command: >
      redis-server --appendonly yes --appendfsync everysec
      --maxmemory 256mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  artifactflow_data:
  postgres_data:
  redis_data:

site_name: ArtifactFlow
site_description: Pi-style 可配置 Agent 引擎 + 双 Artifact 架构的多智能体 SaaS
site_url: https://neutrino1998.github.io/artifact-flow/
repo_url: https://github.com/Neutrino1998/artifact-flow
repo_name: Neutrino1998/artifact-flow

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/custom.css

plugins:
  - search

markdown_extensions:
  - toc:
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: index.md
  - Deployment: deployment.md
  - Architecture:
      - Overview: architecture/overview.md
      - Engine: architecture/engine.md
      - Agents: architecture/agents.md
      - Tools: architecture/tools.md
      - Artifacts: architecture/artifacts.md
      - Data Layer: architecture/data-layer.md
      - Streaming: architecture/streaming.md
      - Concurrency: architecture/concurrency.md
      - Observability: architecture/observability.md
  - Guides:
      - Add Agent: guides/add-agent.md
      - Add Tool: guides/add-tool.md
      - Add Model: guides/add-model.md
      - API Reference: guides/api-reference.md
  - Frontend: frontend.md

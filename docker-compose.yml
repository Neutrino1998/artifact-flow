services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: artifactflow:latest
    container_name: artifactflow-backend
    ports:
      - "8000:8000"
    volumes:
      # 数据持久化：SQLite 数据库
      - ./data:/app/data
    env_file:
      # 环境变量：API Keys 等配置
      - .env
    environment:
      # 可覆盖 .env 中的配置
      - PYTHONUNBUFFERED=1
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: artifactflow-redis
    volumes:
      - redis_data:/data
    command: >
      redis-server --appendonly yes --appendfsync everysec
      --maxmemory 256mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: artifactflow-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:

# Mode 1: Quick Trial — backend + frontend, SQLite + InMemory
# Usage: docker compose up

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: artifactflow:latest
    container_name: artifactflow-backend
    ports:
      - "8000:8000"
    volumes:
      - artifactflow_data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    image: artifactflow-frontend:latest
    container_name: artifactflow-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  artifactflow_data:
